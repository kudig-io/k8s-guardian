apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k8s-guardian.fullname" . }}
  labels:
    {{- include "k8s-guardian.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  WEB_UI_PORT: {{ .Values.config.web.port | quote }}
  WEB_UI_HOST: {{ .Values.config.web.host | quote }}
  LOG_LEVEL: {{ .Values.config.logging.level | quote }}
  LOG_FORMAT: {{ .Values.config.logging.format | quote }}
  METRICS_ENABLED: {{ .Values.config.metrics.enabled | quote }}
  METRICS_PORT: {{ .Values.config.metrics.port | quote }}
  BACKUP_DIR: {{ .Values.config.backup.dir | quote }}
  {{- if .Values.config.ai.apiUrl }}
  AI_API_URL: {{ .Values.config.ai.apiUrl | quote }}
  {{- end }}
  {{- if .Values.config.ai.model }}
  AI_MODEL: {{ .Values.config.ai.model | quote }}
  {{- end }}
