replicaCount: 2

image:
  repository: ghcr.io/kudig-io/k8s-guardian
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1001
  runAsNonRoot: true
  runAsUser: 1001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001

service:
  type: ClusterIP
  webPort: 80
  metricsPort: 9090

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: k8s-guardian.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

config:
  ai:
    apiKey: ""
    apiUrl: "https://api.openai.com/v1/chat/completions"
    model: "gpt-3.5-turbo"
  web:
    port: 8080
    host: "0.0.0.0"
  logging:
    level: "info"
    format: "json"
  metrics:
    enabled: true
    port: 9090
  backup:
    dir: "/app/backups"

secrets:
  aiApiKey: ""

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  backups:
    enabled: true
    size: 5Gi

rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["*"]
      verbs: ["*"]
    - apiGroups: ["apps"]
      resources: ["*"]
      verbs: ["*"]
    - apiGroups: ["batch"]
      resources: ["*"]
      verbs: ["*"]
    - apiGroups: ["extensions"]
      resources: ["*"]
      verbs: ["*"]
    - apiGroups: ["networking.k8s.io"]
      resources: ["*"]
      verbs: ["*"]
    - apiGroups: ["rbac.authorization.k8s.io"]
      resources: ["*"]
      verbs: ["*"]
    - apiGroups: ["storage.k8s.io"]
      resources: ["*"]
      verbs: ["*"]

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

prometheusRules:
  enabled: true
  rules:
    - alert: K8sGuardianDown
      expr: up{job="k8s-guardian"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "k8s-guardian is down"
        description: "k8s-guardian has been down for more than 5 minutes."

    - alert: K8sGuardianHighErrorRate
      expr: rate(http_requests_total{job="k8s-guardian",status_code=~"5.."}[5m]) > 0.05
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High error rate detected"
        description: "Error rate is above 5% for the last 5 minutes."

    - alert: K8sGuardianHighMemoryUsage
      expr: container_memory_usage_bytes{pod=~"k8s-guardian-.*"} / container_spec_memory_limit_bytes{pod=~"k8s-guardian-.*"} > 0.9
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High memory usage"
        description: "Memory usage is above 90% for more than 5 minutes."

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

volumes:
  logs:
    enabled: true
    emptyDir: {}

initContainers: []

extraContainers: []
