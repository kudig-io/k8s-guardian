replicaCount: 3

image:
  repository: ghcr.io/kudig-io/k8s-guardian
  pullPolicy: Always
  tag: "latest"

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: k8s-guardian.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: k8s-guardian-tls
      hosts:
        - k8s-guardian.example.com

config:
  logging:
    level: "info"
    format: "json"
  metrics:
    enabled: true

persistence:
  enabled: true
  storageClass: "standard"
  size: 5Gi
  backups:
    enabled: true
    size: 20Gi

serviceMonitor:
  enabled: true
  interval: 15s

prometheusRules:
  enabled: true

nodeSelector:
  node-role.kubernetes.io/worker: "true"

tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "monitoring"
    effect: "NoSchedule"

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - k8s-guardian
          topologyKey: kubernetes.io/hostname
